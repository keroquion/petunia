<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petulap - Control de Producción</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-gray-100 text-slate-800 font-sans min-h-screen flex flex-col antialiased">
    <!-- Navbar Global -->
    <nav class="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center z-10 sticky top-0">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-laptop-medical text-xl text-blue-400"></i>
            <h1 class="text-xl font-bold tracking-wide">PETULAP</h1>
        </div>
        <div id="nav-user-info" class="hidden-view flex items-center gap-4">
            <span id="user-display" class="font-medium text-sm sm:text-base bg-slate-800 px-3 py-1 rounded-full"></span>
            <button onclick="app.logout()" class="text-red-400 hover:text-red-300 transition" title="Cerrar sesión"><i class="fa-solid fa-right-from-bracket text-lg"></i></button>
        </div>
    </nav>

    <div id="toast-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 w-11/12 max-w-md pointer-events-none"></div>

    <main class="flex-grow flex flex-col items-center justify-start p-4 sm:p-6 w-full max-w-6xl mx-auto mt-4">
        <!-- Vistas dinámicas se cargarán aquí -->
        <div id="app-content">
            <!-- Las vistas se cargarán dinámicamente -->
        </div>
    </main>

    <!-- Scripts principales -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/utils/auth.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
