<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e293b">
    <title>Petulap - Login</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- Estilos -->
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="bg-gray-100 text-slate-800 font-sans min-h-screen flex flex-col antialiased">

    <!-- Navbar -->
    <nav class="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center z-10 sticky top-0">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-laptop-medical text-xl text-blue-400"></i>
            <h1 class="text-xl font-bold tracking-wide">PETULAP</h1>
        </div>
        <div id="nav-user-info" class="hidden-view flex items-center gap-4">
            <span id="user-display" class="font-medium text-sm sm:text-base bg-slate-800 px-3 py-1 rounded-full"></span>
            <button onclick="App.logout()" class="text-red-400 hover:text-red-300 transition" title="Cerrar sesión">
                <i class="fa-solid fa-right-from-bracket text-lg"></i>
            </button>
        </div>
    </nav>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 w-11/12 max-w-md pointer-events-none"></div>

    <!-- Contenido Principal -->
    <main class="flex-grow flex flex-col items-center justify-start p-4 sm:p-6 w-full max-w-6xl mx-auto mt-4">

        <!-- VISTA LOGIN -->
        <div id="view-login" class="w-full max-w-4xl bg-transparent my-auto fade-in grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
            
            <!-- Panel Izquierdo (solo desktop) -->
            <div class="hidden md:flex flex-col justify-between h-full py-4 pl-4 border-l-4 border-slate-300">
                <div>
                    <h3 class="font-black text-xs uppercase tracking-widest text-slate-800 mb-6">Cambios:</h3>
                    <ul class="text-[10px] font-bold text-slate-500 space-y-3 uppercase tracking-widest leading-relaxed">
                        <li>++++++++++++++</li>
                        <li>+ (V6.3) ARQUITECTURA MULTI-PÁGINA</li>
                        <li>+ (V6.2) DISEÑO MOBILE-FIRST</li>
                        <li>+ (V6.1) CARGA DINÁMICA DE TÉCNICOS</li>
                        <li>+ (V6.0) ARQUITECTURA DB NATIVA</li>
                        <li>++++++++++++++</li>
                    </ul>
                </div>
                <div class="mt-12">
                    <span class="text-[10px] font-black text-slate-800 uppercase tracking-widest">VERSION--- 6.3</span>
                </div>
            </div>

            <!-- Formulario de Login -->
            <div class="bg-white rounded-3xl shadow-2xl p-8 sm:p-10 border-b-8 border-blue-600 relative">
                <div class="text-center mb-8">
                    <div class="bg-blue-100 text-blue-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                        <i class="fa-solid fa-user-lock text-3xl"></i>
                    </div>
                    <h2 class="text-3xl font-black text-gray-800 uppercase tracking-widest">Login</h2>
                </div>

                <form id="form-login" class="space-y-6" onsubmit="event.preventDefault(); App.login();">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 uppercase text-[10px] tracking-widest">Usuario</label>
                        <input type="text" id="login-user" required 
                            class="w-full p-4 bg-gray-50 border-2 border-gray-200 rounded-xl focus:ring-0 focus:border-blue-500 outline-none transition text-lg font-bold text-blue-900" 
                            placeholder="Ingresa tu ID">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 uppercase text-[10px] tracking-widest">Contraseña</label>
                        <input type="password" id="login-pass" required 
                            class="w-full p-4 bg-gray-50 border-2 border-gray-200 rounded-xl focus:ring-0 focus:border-blue-500 outline-none transition text-lg font-bold text-blue-900" 
                            placeholder="••••••••">
                    </div>

                    <button type="submit" id="btn-login" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-xl text-lg transition shadow-lg shadow-blue-500/50 flex justify-center items-center gap-2 uppercase tracking-widest border-b-4 border-blue-800 active:border-b-0 active:translate-y-1 mt-4">
                        INGRESAR <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>
            </div>

            <!-- Versión Mobile -->
            <div class="md:hidden text-center mt-6">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-t-2 border-slate-200 pt-4 block">Versión 6.3 | Multi-Página</span>
            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script src="../js/config.js"></script>
    <script src="../js/utils/audio.js"></script>
    <script src="../js/utils/helpers.js"></script>
    <script src="../js/utils/ui.js"></script>
    <script src="../js/api/database.js"></script>
    <script src="../js/app.js"></script>

</body>
</html>
