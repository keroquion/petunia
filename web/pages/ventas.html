<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4f46e5">
    <title>Petulap - Ventas</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- Estilos -->
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="bg-gray-100 text-slate-800 font-sans min-h-screen flex flex-col antialiased">

    <!-- Navbar -->
    <nav class="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center z-10 sticky top-0">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-laptop-medical text-xl text-blue-400"></i>
            <h1 class="text-xl font-bold tracking-wide">PETULAP</h1>
        </div>
        <div id="nav-user-info" class="flex items-center gap-4">
            <span id="user-display" class="font-medium text-sm sm:text-base bg-slate-800 px-3 py-1 rounded-full"></span>
            <button onclick="App.logout()" class="text-red-400 hover:text-red-300 transition" title="Cerrar sesión">
                <i class="fa-solid fa-right-from-bracket text-lg"></i>
            </button>
        </div>
    </nav>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 w-11/12 max-w-md pointer-events-none"></div>

    <!-- Contenido Principal -->
    <main id="view-ventas" class="flex-grow flex flex-col items-center justify-start p-4 sm:p-6 w-full max-w-6xl mx-auto">

        <!-- Header -->
        <div class="bg-indigo-900 text-white rounded-3xl shadow-xl p-6 mb-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b-8 border-indigo-950 w-full">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="bg-indigo-700 p-4 rounded-2xl shadow-inner border border-indigo-500">
                    <i class="fa-solid fa-truck-fast text-white text-3xl"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-black uppercase tracking-widest text-outline">Despacho & Logística</h2>
                    <p class="text-sm font-bold text-indigo-300 uppercase tracking-wider text-xs">Control de requerimientos</p>
                </div>
            </div>
            <button onclick="VentasView.cargarDatos()" class="bg-indigo-800 hover:bg-indigo-700 p-3 rounded-xl font-black transition flex items-center gap-2 uppercase tracking-widest text-xs border-b-4 border-indigo-950 active:border-b-0 active:translate-y-1">
                <i class="fa-solid fa-arrows-rotate"></i> Actualizar Radar
            </button>
        </div>

        <!-- Grid Principal -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 w-full">
            
            <!-- Formulario de Emisión -->
            <div class="lg:col-span-1 bg-white rounded-3xl shadow-xl p-6 border-t-4 border-indigo-500 h-fit">
                <h3 class="text-lg font-black text-gray-800 mb-4 border-b-2 border-gray-100 pb-2 uppercase tracking-widest">
                    <i class="fa-solid fa-satellite-dish text-indigo-500 mr-2"></i> Lanzar Requerimiento
                </h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-black text-gray-500 mb-1 uppercase tracking-wider">Tipo de Acción:</label>
                        <select id="ventas-tipo" onchange="VentasView.cambiarTipo()" class="w-full p-3 border-2 border-gray-200 rounded-xl font-black text-indigo-900 bg-gray-50 outline-none focus:border-indigo-500 cursor-pointer">
                            <option value="PEDIDO_VENTAS">🚚 Pedido de Equipos (Logística)</option>
                            <option value="EMERGENCIA">🚨 Prioridad Alta (Bloqueo)</option>
                            <option value="MENSAJE">📢 Mensaje General (Aviso)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-gray-500 mb-1 uppercase tracking-wider">Destinatario:</label>
                        <select id="ventas-destino" class="w-full p-3 border-2 border-gray-200 rounded-xl font-black text-indigo-900 bg-gray-50 outline-none focus:border-indigo-500 cursor-pointer select-tecnicos-dinamico">
                            <option value="TODOS">TODOS (Planta)</option>
                        </select>
                    </div>

                    <div>
                        <label id="lbl-ventas-titulo" class="block text-xs font-black text-gray-500 mb-1 uppercase tracking-wider">Título de Misión:</label>
                        <input type="text" id="ventas-titulo" class="w-full p-3 border-2 border-gray-200 rounded-xl uppercase font-black outline-none focus:border-indigo-500 text-slate-800" placeholder="Ej. Enviar a Ejército">
                    </div>

                    <div>
                        <label class="block text-xs font-black text-gray-500 mb-1 uppercase tracking-wider flex justify-between">
                            <span>Lista de Items / Mensaje:</span>
                            <span class="text-[9px] text-indigo-400 bg-indigo-50 px-1 rounded border border-indigo-100">Usa 'ENTER' para separar</span>
                        </label>
                        <textarea id="ventas-detalle" rows="4" class="w-full p-3 border-2 border-gray-200 rounded-xl font-bold outline-none focus:border-indigo-500 text-sm" placeholder="Ej:
3 laptops L490
2 monitores 24"></textarea>
                    </div>

                    <button id="btn-despachar" onclick="VentasView.asignarMision()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl transition uppercase tracking-widest border-b-4 border-indigo-800 active:border-b-0 active:translate-y-1 mt-2">
                        <i class="fa-solid fa-paper-plane"></i> Despachar
                    </button>
                </div>
            </div>

            <!-- Radar y Estado -->
            <div class="lg:col-span-2 flex flex-col gap-6">
                
                <!-- Radar Logístico -->
                <div class="bg-white rounded-3xl shadow-xl p-6 border-t-4 border-slate-800 flex-grow">
                    <h3 class="text-lg font-black text-gray-800 mb-4 border-b-2 border-gray-100 pb-2 uppercase tracking-widest">
                        <i class="fa-solid fa-radar text-blue-500 mr-2 fa-spin"></i> Radar Logístico (Últ. 48h)
                    </h3>
                    <div id="ventas-radar-lista" class="space-y-4"></div>
                </div>

                <!-- Estado de Planta -->
                <div class="bg-white rounded-3xl shadow-xl p-6 border-t-4 border-emerald-500">
                    <h3 class="text-lg font-black text-gray-800 mb-4 border-b-2 border-gray-100 pb-2 uppercase tracking-widest">
                        <i class="fa-solid fa-users text-emerald-500 mr-2"></i> Estado de Planta (En Vivo)
                    </h3>
                    <div id="ventas-grid-tecnicos" class="grid grid-cols-2 lg:grid-cols-4 gap-4"></div>
                </div>
            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script src="../js/config.js"></script>
    <script src="../js/utils/audio.js"></script>
    <script src="../js/utils/helpers.js"></script>
    <script src="../js/utils/ui.js"></script>
    <script src="../js/api/database.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/views/ventas.js"></script>

</body>
</html>
